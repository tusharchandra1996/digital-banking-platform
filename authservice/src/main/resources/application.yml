server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret-key: 12345678901234567890123456789012345678901234567890
  access-token-expiry-ms: 900000
  refresh-token-expiry-ms: 604800000

logging:
  level:
    com.bank.authservice: DEBUG